<style>
    .teams-shell {
        --ts-primary: #667eea;
        --ts-primary-dark: #5a67d8;
        --ts-accent: #764ba2;
        --ts-text: #0f172a;
        --ts-muted: #475569;
        --ts-soft: #64748b;
        --ts-border: rgba(99, 102, 241, 0.15);
        --ts-card-shadow: 0 20px 70px rgba(15, 23, 42, 0.08);
        --ts-radius: 22px;
        --ts-radius-sm: 14px;
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 24px 56px;
        color: var(--ts-text);
        font-family: 'Inter', sans-serif;
    }

    .teams-shell a {
        color: inherit;
    }

    .teams-hero {
        text-align: center;
        padding: 28px 0 40px;
        max-width: 720px;
        margin: 0 auto;
    }

    .teams-hero h1 {
        font-size: clamp(2rem, 4vw, 2.75rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .teams-hero p {
        color: var(--ts-muted);
        font-size: 1.05rem;
        line-height: 1.6;
        margin: 0;
    }

    .teams-hero__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 24px;
    }

    .teams-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 28px;
    }

    .teams-toolbar__title {
        text-align: left;
    }

    .teams-toolbar__title h1 {
        font-size: clamp(1.75rem, 3vw, 2.25rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 6px;
        color: var(--ts-text);
    }

    .teams-toolbar__title p {
        margin: 0;
        color: var(--ts-muted);
        font-size: 0.98rem;
    }

    .teams-toolbar__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
    }

    .ts-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 22px;
        border-radius: 999px;
        font-size: 0.95rem;
        font-weight: 600;
        border: 1px solid transparent;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        font-family: inherit;
        background: transparent;
        color: var(--ts-text);
    }

    .ts-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
    }

    .ts-btn--primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        box-shadow: 0 14px 32px rgba(102, 126, 234, 0.25);
    }

    .ts-btn--primary:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 18px 40px rgba(102, 126, 234, 0.32);
    }

    .ts-btn--ghost {
        background: #fff;
        color: var(--ts-primary-dark);
        border-color: rgba(102, 126, 234, 0.22);
    }

    .ts-btn--ghost:hover:not(:disabled) {
        background: rgba(102, 126, 234, 0.08);
    }

    .ts-btn--danger {
        background: #fff;
        color: #b91c1c;
        border-color: rgba(185, 28, 28, 0.25);
    }

    .ts-btn--danger:hover:not(:disabled) {
        background: #fef2f2;
    }

    .ts-btn--danger-solid {
        background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
        color: #fff;
        border: none;
        box-shadow: 0 12px 28px rgba(239, 68, 68, 0.25);
    }

    .ts-btn--success {
        background: linear-gradient(135deg, #34d399 0%, #059669 100%);
        color: #fff;
        border: none;
        box-shadow: 0 12px 28px rgba(5, 150, 105, 0.22);
    }

    .ts-btn--sm {
        padding: 8px 16px;
        font-size: 0.85rem;
    }

    .ts-btn--block {
        width: 100%;
    }

    .ts-card {
        background: #fff;
        border: 1px solid var(--ts-border);
        border-radius: var(--ts-radius);
        box-shadow: var(--ts-card-shadow);
        overflow: hidden;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .ts-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.1);
    }

    .ts-card__body {
        padding: 24px 26px;
    }

    .ts-card__head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 14px;
    }

    .ts-card__title {
        font-size: 1.15rem;
        font-weight: 600;
        margin: 0;
        color: #111827;
    }

    .ts-card__title a {
        text-decoration: none;
        color: inherit;
        transition: color 0.15s ease;
    }

    .ts-card__title a:hover {
        color: var(--ts-primary);
    }

    .ts-meta {
        font-size: 0.88rem;
        color: var(--ts-muted);
        margin: 0 0 10px;
        line-height: 1.5;
    }

    .ts-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    .ts-badge--public {
        background: rgba(52, 211, 153, 0.15);
        color: #047857;
    }

    .ts-badge--private {
        background: rgba(99, 102, 241, 0.12);
        color: var(--ts-primary-dark);
    }

    .ts-badge--lead {
        background: rgba(251, 191, 36, 0.2);
        color: #b45309;
    }

    .ts-badge--open {
        background: rgba(52, 211, 153, 0.15);
        color: #047857;
    }

    .ts-badge--full {
        background: rgba(248, 113, 113, 0.18);
        color: #b91c1c;
    }

    .ts-badge--neutral {
        background: rgba(148, 163, 184, 0.2);
        color: #475569;
    }

    .ts-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 28px;
    }

    .ts-tab {
        padding: 12px 22px;
        border-radius: 999px;
        border: 1px solid var(--ts-border);
        background: #fff;
        color: var(--ts-muted);
        font-weight: 600;
        font-size: 0.92rem;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s ease;
    }

    .ts-tab:hover {
        border-color: rgba(102, 126, 234, 0.35);
        color: var(--ts-primary-dark);
    }

    .ts-tab--active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 12px 28px rgba(102, 126, 234, 0.22);
    }

    .ts-tab-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 22px;
        height: 22px;
        padding: 0 7px;
        margin-left: 8px;
        border-radius: 999px;
        font-size: 0.75rem;
        background: rgba(255, 255, 255, 0.25);
    }

    .ts-tab--active .ts-tab-count {
        background: rgba(255, 255, 255, 0.3);
    }

    .ts-panel {
        background: #fff;
        border: 1px solid var(--ts-border);
        border-radius: var(--ts-radius);
        padding: 28px;
        box-shadow: var(--ts-card-shadow);
        margin-bottom: 24px;
    }

    .ts-filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 18px;
        align-items: end;
    }

    .ts-field label,
    .ts-label {
        display: block;
        font-weight: 600;
        font-size: 0.88rem;
        color: #374151;
        margin-bottom: 8px;
    }

    .teams-shell .form-control,
    .teams-shell select.form-control,
    .teams-shell input.form-control,
    .teams-shell textarea.form-control,
    .teams-shell .ts-input,
    .teams-shell .ts-select,
    .teams-shell .ts-textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 1rem;
        font-family: inherit;
        color: #1f2937 !important;
        background: #fff !important;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .teams-shell .form-control:focus,
    .teams-shell .ts-input:focus,
    .teams-shell .ts-select:focus,
    .teams-shell .ts-textarea:focus {
        outline: none;
        border-color: var(--ts-primary);
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    .ts-filter-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .ts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
        gap: 22px;
    }

    .ts-grid--2 {
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
    }

    .ts-progress {
        height: 8px;
        background: #e2e8f0;
        border-radius: 999px;
        overflow: hidden;
        margin-top: 8px;
    }

    .ts-progress__bar {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        transition: width 0.35s ease;
    }

    .ts-progress--labeled {
        height: auto;
        background: transparent;
        margin-top: 10px;
    }

    .ts-progress--labeled .ts-progress__track {
        height: 22px;
        background: #e2e8f0;
        border-radius: 10px;
        overflow: hidden;
    }

    .ts-progress--labeled .ts-progress__bar {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        font-weight: 700;
        color: #fff;
        min-width: 2.5rem;
    }

    .ts-section-title {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--ts-text);
        margin: 0 0 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .ts-row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
    }

    .ts-request-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 20px;
        border: 1px solid var(--ts-border);
        border-radius: var(--ts-radius-sm);
        background: #fafbff;
        margin-bottom: 12px;
    }

    .ts-request-row:last-child {
        margin-bottom: 0;
    }

    .ts-empty {
        text-align: center;
        padding: 48px 24px;
        background: #fff;
        border: 1px dashed rgba(102, 126, 234, 0.25);
        border-radius: var(--ts-radius);
        color: var(--ts-muted);
    }

    .ts-empty h2,
    .ts-empty h3 {
        color: var(--ts-text);
        font-size: 1.25rem;
        margin: 0 0 10px;
    }

    .ts-empty p {
        margin: 0 0 22px;
        max-width: 420px;
        margin-left: auto;
        margin-right: auto;
    }

    .ts-messages {
        margin-bottom: 20px;
    }

    .ts-message {
        padding: 14px 18px;
        border-radius: 14px;
        margin-bottom: 10px;
        font-weight: 500;
        font-size: 0.95rem;
    }

    .ts-message--success {
        background: rgba(52, 211, 153, 0.15);
        color: #065f46;
        border: 1px solid rgba(5, 150, 105, 0.2);
    }

    .ts-message--error {
        background: rgba(248, 113, 113, 0.12);
        color: #991b1b;
        border: 1px solid rgba(185, 28, 28, 0.2);
    }

    .ts-message--info {
        background: rgba(99, 102, 241, 0.1);
        color: #3730a3;
        border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .ts-pagination {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-top: 36px;
        list-style: none;
        padding: 0;
    }

    .ts-pagination a,
    .ts-pagination span {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 42px;
        height: 42px;
        padding: 0 14px;
        border-radius: 12px;
        font-weight: 600;
        text-decoration: none;
        border: 1px solid var(--ts-border);
        background: #fff;
        color: var(--ts-muted);
    }

    .ts-pagination a:hover {
        border-color: var(--ts-primary);
        color: var(--ts-primary-dark);
    }

    .ts-pagination .is-active span {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        border-color: transparent;
    }

    .ts-detail-header {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 28px;
    }

    .ts-detail-header h1 {
        font-size: clamp(1.6rem, 3vw, 2.2rem);
        font-weight: 700;
        margin: 0 0 10px;
        letter-spacing: -0.02em;
        color: var(--ts-text);
    }

    .ts-detail-sub {
        color: var(--ts-muted);
        font-size: 0.95rem;
        margin: 0;
    }

    .ts-detail-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
    }

    .ts-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
    }

    @media (min-width: 992px) {
        .ts-layout {
            grid-template-columns: 1fr 340px;
        }
    }

    .ts-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .ts-list-item {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 16px 0;
        border-bottom: 1px solid #e2e8f0;
    }

    .ts-list-item:last-child {
        border-bottom: none;
    }

    .ts-card-header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 18px 22px;
        background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
        border-bottom: 1px solid var(--ts-border);
    }

    .ts-card-header-bar h2 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
    }

    .ts-stat-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        text-align: center;
        padding-top: 8px;
    }

    @media (max-width: 600px) {
        .ts-stat-row {
            grid-template-columns: 1fr;
        }
    }

    .ts-stat-row strong {
        display: block;
        font-size: 1rem;
        color: var(--ts-text);
    }

    .ts-stat-row small {
        color: var(--ts-muted);
        font-size: 0.82rem;
    }

    .ts-divider {
        border: none;
        border-top: 1px solid #e2e8f0;
        margin: 20px 0;
    }

    .ts-table-wrap {
        overflow-x: auto;
        border-radius: var(--ts-radius-sm);
        border: 1px solid var(--ts-border);
    }

    .ts-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.92rem;
    }

    .ts-table th,
    .ts-table td {
        padding: 14px 16px;
        text-align: left;
        border-bottom: 1px solid #e2e8f0;
    }

    .ts-table th {
        background: #f8fafc;
        font-weight: 700;
        color: #334155;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }

    .ts-table tr:last-child td {
        border-bottom: none;
    }

    .ts-table tr:hover td {
        background: #fafbff;
    }

    .ts-code-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
    }

    .ts-code-row input {
        flex: 1;
        font-family: ui-monospace, monospace;
        font-size: 0.9rem;
    }

    .teams-shell dialog.ts-dialog {
        border: none;
        border-radius: var(--ts-radius);
        padding: 0;
        max-width: 460px;
        width: calc(100vw - 32px);
        box-shadow: 0 28px 90px rgba(15, 23, 42, 0.25);
    }

    .teams-shell dialog.ts-dialog::backdrop {
        background: rgba(15, 23, 42, 0.48);
        backdrop-filter: blur(4px);
    }

    .ts-dialog__head {
        padding: 22px 24px 0;
    }

    .ts-dialog__head h3 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
    }

    .ts-dialog__body {
        padding: 16px 24px;
    }

    .ts-dialog__foot {
        padding: 8px 24px 22px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
    }

    .ts-toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        opacity: 0;
        background: #0f172a;
        color: #e2e8f0;
        padding: 12px 20px;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 500;
        z-index: 200;
        transition: transform 0.25s ease, opacity 0.25s ease;
        pointer-events: none;
    }

    .ts-toast.is-visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
    }

    .ts-form-panel {
        background: #fff;
        border: 1px solid var(--ts-border);
        border-radius: var(--ts-radius);
        padding: 36px 40px;
        box-shadow: var(--ts-card-shadow);
    }

    @media (max-width: 640px) {
        .ts-form-panel {
            padding: 28px 22px;
        }
    }

    .ts-form-panel h1 {
        font-size: 1.65rem;
        font-weight: 700;
        margin: 0 0 28px;
        color: var(--ts-text);
    }

    .ts-form-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 8px;
    }

    @media (max-width: 480px) {
        .ts-form-actions {
            grid-template-columns: 1fr;
        }
    }

    .ts-alert {
        padding: 14px 18px;
        border-radius: 14px;
        font-size: 0.92rem;
        margin-bottom: 20px;
        border: 1px solid transparent;
    }

    .ts-alert--danger {
        background: rgba(248, 113, 113, 0.1);
        border-color: rgba(185, 28, 28, 0.2);
        color: #991b1b;
    }

    .ts-alert--warn {
        background: rgba(251, 191, 36, 0.15);
        border-color: rgba(217, 119, 6, 0.25);
        color: #92400e;
    }

    .ts-alert--info {
        background: rgba(99, 102, 241, 0.08);
        border-color: rgba(99, 102, 241, 0.2);
        color: #3730a3;
    }

    .teams-shell .helptext {
        display: block;
        font-size: 0.86rem;
        color: var(--ts-muted);
        margin-top: 8px;
        line-height: 1.45;
    }

    .ts-delete-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: rgba(248, 113, 113, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.75rem;
    }

    .ts-center {
        text-align: center;
    }

    .ts-muted-block {
        color: var(--ts-muted);
        font-size: 0.95rem;
        line-height: 1.65;
    }

    .ts-hidden {
        display: none !important;
    }
</style>
